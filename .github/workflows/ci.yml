name: ci

on:
  pull_request:
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"

jobs:
  # ──────────────────────────────────────
  # Lint — コードの書き方ルール違反を検出
  # ──────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npm run lint

  # ──────────────────────────────────────
  # Type Check — TypeScript の型エラーを検出
  # ──────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - run: npx tsc --noEmit

  # ──────────────────────────────────────
  # Build — 本番ビルドが通るか検証
  # ──────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js
        # Use build:local — skips `prisma migrate deploy` which needs a
        # reachable DB. Migrations run during Vercel production deploys, not
        # in CI. Build-time env stubs only feed `next build`'s static checks.
        run: npm run build:local
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

  # ──────────────────────────────────────
  # Prisma — スキーマの整合性チェック
  # ──────────────────────────────────────
  prisma:
    name: Prisma Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Validate schema
        run: npx prisma validate

  # ──────────────────────────────────────
  # Unit Test — Vitest ユニットテスト
  # ──────────────────────────────────────
  unit-test:
    name: Unit Test
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - run: npm test

  # ──────────────────────────────────────
  # Bundle Size Guard — 主要 chunk が膨れた瞬間に CI で気づく
  # (Phase 4 launch readiness で追加)
  # ──────────────────────────────────────
  bundle-size:
    name: Bundle size guard
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js (no analyze)
        run: npm run build:local
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Check largest chunk size
        # Soft warn at 450 KB (current baseline 435 KB + 3.5 % headroom),
        # hard fail at 500 KB (current + 15 %). Tightens as the bundle
        # shrinks — bump these values down once docs/harness/bundle-baseline-2.md
        # § 3 candidates land. Largest-chunk is a proxy for First Load JS;
        # see bundle-baseline-2.md § 4 for the rationale.
        run: |
          MAX=$(find .next/static/chunks -name '*.js' -printf '%s\n' | sort -nr | head -1)
          MAX_KB=$((MAX / 1024))
          echo "Largest chunk: ${MAX_KB} KB"
          if [ "$MAX_KB" -gt 500 ]; then
            echo "::error::Largest chunk ${MAX_KB} KB exceeds 500 KB ceiling — see docs/harness/bundle-baseline-2.md"
            exit 1
          fi
          if [ "$MAX_KB" -gt 450 ]; then
            echo "::warning::Largest chunk ${MAX_KB} KB approaching 500 KB ceiling"
          fi

  # ──────────────────────────────────────
  # E2E Test — Playwright ブラウザテス���
  # (テストファイルが存在する場合のみ実行)
  # ──────────────────────────────────────
  e2e-test:
    name: E2E Test
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check for E2E tests
        id: check
        run: |
          if find tests/e2e -name '*.ts' -o -name '*.spec.ts' 2>/dev/null | grep -q .; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "No E2E test files found — skipping"
          fi

      - uses: actions/setup-node@v5
        if: steps.check.outputs.has_tests == 'true'
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        if: steps.check.outputs.has_tests == 'true'
        run: npm ci

      - name: Generate Prisma Client
        if: steps.check.outputs.has_tests == 'true'
        run: npx prisma generate

      - name: Install Playwright browsers
        if: steps.check.outputs.has_tests == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        if: steps.check.outputs.has_tests == 'true'
        run: npm run test:e2e
        env:
          # Existing E2E specs cover unauthenticated flows only (landing,
          # signup form validation, pages that redirect to /login). They do
          # not need a real Supabase connection, so prefer GitHub secrets
          # when provided but fall back to the same placeholder pattern the
          # `build` job uses — this keeps CI green without requiring the
          # repository to carry production credentials.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}

      - name: Upload test report
        if: steps.check.outputs.has_tests == 'true' && always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
