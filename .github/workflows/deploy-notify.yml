name: deploy-notify

# 本番デプロイが完了したらサマリーに記録する

on:
  deployment_status:

permissions:
  contents: read

jobs:
  notify:
    name: Production Deploy Notification
    if: >-
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'Production'
    runs-on: ubuntu-latest
    steps:
      - name: Log production deployment
        run: |
          echo "## 🚀 Production Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **URL** | ${{ github.event.deployment_status.target_url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${GITHUB_SHA::7}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Time** | $(date -u +'%Y-%m-%d %H:%M UTC') |" >> "$GITHUB_STEP_SUMMARY"
