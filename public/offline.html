<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>オフラインです · Haretoki</title>
    <style>
      :root {
        --bg: #faf6ee;
        --bg-tint: #f5eadb;
        --fg: #3b3229;
        --muted: #7a6e62;
        --gold: #cba968;
        --border: #e8dfcf;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1a1613;
          --bg-tint: #231d17;
          --fg: #eadcc6;
          --muted: #9e897a;
          --border: #3a3028;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        background:
          radial-gradient(ellipse 80% 50% at 20% 0%, color-mix(in oklab, var(--bg-tint) 80%, transparent) 0%, var(--bg) 70%),
          radial-gradient(ellipse 60% 40% at 85% 100%, color-mix(in oklab, var(--gold) 12%, transparent) 0%, var(--bg) 70%),
          var(--bg);
        color: var(--fg);
        font-family:
          "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Hiragino Sans",
          system-ui, sans-serif;
        font-weight: 400;
        -webkit-font-smoothing: antialiased;
      }
      main {
        width: 100%;
        max-width: 22rem;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
      }
      h1 {
        font-family: "Shippori Mincho", "Noto Serif JP", serif;
        font-size: 1.5rem;
        font-weight: 300;
        letter-spacing: -0.01em;
        line-height: 1.45;
        margin: 0;
      }
      p {
        margin: 0.75rem 0 0;
        font-size: 0.875rem;
        line-height: 1.7;
        color: var(--muted);
      }
      button {
        min-height: 2.75rem;
        padding: 0.75rem 1.25rem;
        border-radius: 0.625rem;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--fg);
        font-size: 0.9375rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <svg width="72" height="72" viewBox="0 0 72 72" aria-hidden="true">
        <defs>
          <radialGradient id="sun" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#cba968" stop-opacity="0.9" />
            <stop offset="100%" stop-color="#cba968" stop-opacity="0" />
          </radialGradient>
        </defs>
        <circle cx="36" cy="36" r="28" fill="url(#sun)" />
        <path d="M12 44 Q 24 38 36 42 T 60 40" stroke="var(--muted)" stroke-width="1.25" stroke-linecap="round" fill="none" opacity="0.55" />
        <path d="M16 52 Q 30 48 44 50 T 58 48" stroke="var(--muted)" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.35" />
      </svg>
      <div>
        <h1>少し、雲がかかっています</h1>
        <p>電波が届くところで、もう一度ひらいてみてください。</p>
      </div>
      <button type="button" onclick="location.reload()">もう一度ひらく</button>
    </main>
  </body>
</html>
